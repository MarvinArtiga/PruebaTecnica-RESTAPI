version: '3.8'

services:

  db:
    image: postgres:15
    container_name: postgres_pedidos

    environment:
      POSTGRES_DB: pedidosdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ps123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: