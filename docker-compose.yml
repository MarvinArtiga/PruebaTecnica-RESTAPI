services:

  db:
    image: postgres:15

    container_name: pedidos-db

    environment:
      POSTGRES_DB: pedidosdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:

    build: .

    container_name: pedidos-api

    depends_on:
      - db

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/pedidosdb
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: ps123

volumes:
  postgres_data: